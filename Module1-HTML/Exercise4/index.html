<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML5 Exercise 4 - Image Gallery</title>
  <style>
    body { font-family: Arial, sans-serif; }
    table { width: 100%; border-collapse: collapse; }
    caption { font-weight: bold; margin-bottom: 12px; }
    td { padding: 8px; text-align: center; }
    .gallery-img { border: 2px solid #64748b; width: 100%; max-width: 240px; height: auto; }
  </style>
</head>
<body>
  <table>
    <caption>Community Event Gallery</caption>
    <tr>
      <td><img class="gallery-img" src="https://via.placeholder.com/240x150" alt="Music event" title="Music event"></td>
      <td><img class="gallery-img" src="https://via.placeholder.com/240x150" alt="Food fair" title="Food fair"></td>
      <td><img class="gallery-img" src="https://via.placeholder.com/240x150" alt="Art show" title="Art show"></td>
    </tr>
    <tr>
      <td><img class="gallery-img" src="https://via.placeholder.com/240x150" alt="Sports day" title="Sports day"></td>
      <td><img class="gallery-img" src="https://via.placeholder.com/240x150" alt="Volunteer drive" title="Volunteer drive"></td>
      <td><img class="gallery-img" src="https://via.placeholder.com/240x150" alt="Festival lights" title="Festival lights"></td>
    </tr>
  </table>
</body>
</html>
