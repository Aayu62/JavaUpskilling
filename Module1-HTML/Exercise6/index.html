<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML5 Exercise 6 - Event Handling</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; }
    img { width: 220px; transition: transform 0.2s ease; cursor: pointer; }
    img.enlarged { transform: scale(1.4); }
    .box { max-width: 700px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="box">
    <label for="phone">Phone number</label>
    <input id="phone" type="text" onblur="validatePhone(this)" placeholder="1234567890">
    <p id="phoneMsg"></p>
  </div>

  <div class="box">
    <label for="feeSelect">Event type</label>
    <select id="feeSelect" onchange="showFee(this)">
      <option value="">Choose one</option>
      <option value="10">Music Night</option>
      <option value="20">Food Fair</option>
      <option value="15">Art Show</option>
    </select>
    <p>Fee: <span id="feeDisplay">-</span></p>
  </div>

  <div class="box">
    <textarea id="feedback" rows="5" placeholder="Type feedback here" onkeyup="countChars(this)"></textarea>
    <p>Characters: <span id="charCount">0</span></p>
  </div>

  <div class="box">
    <img src="https://via.placeholder.com/220x140" alt="Event image" ondblclick="toggleImageSize(this)">
  </div>

  <button onclick="confirmSubmit()">Submit</button>
  <p id="submitMsg"></p>

  <script>
    function validatePhone(input) {
      const msg = document.getElementById('phoneMsg');
      msg.textContent = /^\d{10}$/.test(input.value) ? 'Phone number looks valid.' : 'Enter a 10-digit phone number.';
    }

    function showFee(select) {
      document.getElementById('feeDisplay').textContent = select.value ? `$${select.value}` : '-';
    }

    function confirmSubmit() {
      document.getElementById('submitMsg').textContent = 'Registration confirmation sent.';
    }

    function toggleImageSize(img) {
      img.classList.toggle('enlarged');
    }

    function countChars(textarea) {
      document.getElementById('charCount').textContent = textarea.value.length;
    }
  </script>
</body>
</html>
