<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML5 Exercise 3 - ID and Class Styling</title>
  <style>
    #welcomeBanner {
      background: #dbeafe;
      padding: 20px;
      border: 1px solid #93c5fd;
    }
    .highlight {
      background: #fef3c7;
      padding: 2px 6px;
    }
  </style>
</head>
<body>
  <div id="welcomeBanner">
    <h1>Welcome back, resident!</h1>
    <p>Enjoy your <span style="color: red; font-weight: bold;">special offer</span> for this week.</p>
    <p class="highlight">This line is highlighted using a class.</p>
  </div>
</body>
</html>
