<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML5 Exercise 9 - Geolocation</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; }
    button { padding: 10px 14px; }
  </style>
</head>
<body>
  <h1>Find Nearby Events</h1>
  <button onclick="findLocation()">Find Nearby Events</button>
  <p id="locationStatus"></p>

  <script>
    function findLocation() {
      const status = document.getElementById('locationStatus');
      if (!navigator.geolocation) {
        status.textContent = 'Geolocation is not supported in this browser.';
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function (position) {
          status.textContent = `Latitude: ${position.coords.latitude}, Longitude: ${position.coords.longitude}`;
        },
        function (error) {
          status.textContent = `Location error: ${error.message}`;
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }
  </script>
</body>
</html>
