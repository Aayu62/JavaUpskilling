<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML5 Exercise 1 - Base Template</title>
  <!-- Navigation -->
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      line-height: 1.6;
    }
    header, main, footer {
      padding: 24px;
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav>
    <a href="#home">Home</a> |
    <a href="#events">Events</a> |
    <a href="#contact">Contact</a>
  </nav>

  <!-- Main -->
  <main>
    <section id="home">
      <h1>Local Community Event Portal</h1>
      <p>This is the base HTML5 template for the portal.</p>
    </section>
    <section id="events">
      <h2>Events</h2>
      <p>Event listings will appear here.</p>
    </section>
    <section id="contact">
      <h2>Contact</h2>
      <p>Contact information for the city council.</p>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Local Community Event Portal</p>
  </footer>
</body>
</html>
