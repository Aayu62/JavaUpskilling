<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two Column Layout</title>
  <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container mt-5">
    <div class="row">
      <div class="col-sm-3 bg-primary text-white p-3">Column 1</div>
      <div class="col-sm-3 bg-success text-white p-3">Column 2</div>
      <div class="col-sm-3 bg-warning text-dark p-3">Column 3</div>
      <div class="col-sm-3 bg-danger text-white p-3">Column 4</div>
    </div>
  </div>  
  <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
