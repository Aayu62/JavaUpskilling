<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 7.1 - Typography Utilities</title>
  <link rel="stylesheet" href="../bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>
<body>
  <main class="container py-5">
    <!-- display-1 creates a very large heading for emphasis. -->
    <!-- lead makes the intro paragraph slightly larger and easier to scan. -->
    <!-- text-muted and fw-bold demonstrate common text emphasis patterns. -->
    <h1 class="display-1">Bootstrap Typography</h1>
    <p class="lead text-muted">This sample page shows how Bootstrap can control hierarchy and readability.</p>
    <p><span class="fw-bold">Bold text</span> and <span class="text-muted">muted text</span> are useful for visual contrast.</p>
  </main>
  <script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
