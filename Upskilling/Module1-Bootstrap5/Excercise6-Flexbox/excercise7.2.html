<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 7.2 - Flex Card Layout</title>
  <link rel="stylesheet" href="../bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>
<body>
  <main class="container py-5">
    <!-- justify-content-between pushes items to opposite ends. -->
    <!-- align-items-center keeps the title and button aligned nicely even when the card grows. -->
    <div class="card">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <h1 class="h5 mb-1">Flexible card header</h1>
          <p class="mb-0 text-muted">This layout stays tidy when the text wraps on smaller screens.</p>
        </div>
        <button class="btn btn-primary">Action</button>
      </div>
    </div>
  </main>
  <script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
