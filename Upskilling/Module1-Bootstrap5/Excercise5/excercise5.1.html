<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 5.1 - Centering Content</title>
  <!-- Bootstrap is loaded from the local Bootstrap 5.3.8 folder so the page works offline. -->
  <link rel="stylesheet" href="../bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>
<body>
  <main class="container py-5">
    <!-- This row uses Bootstrap flex utilities to center the box both horizontally and vertically. -->
    <!-- justify-content-center centers on the horizontal axis, align-items-center centers on the vertical axis. -->
    <!-- min-vh-50 gives the demo enough height to show the centering effect on different screen sizes. -->
    <div class="row justify-content-center align-items-center min-vh-50 border rounded-3 bg-light p-4">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="p-4 text-center bg-white border rounded-3 shadow-sm">
          <h1 class="h3 mb-3">Centered content</h1>
          <p class="mb-0 text-muted">
            On small screens this box stays full width, and on medium screens it becomes narrower so the layout feels balanced.
          </p>
        </div>
      </div>
    </div>
  </main>

  <script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
