<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 11.1 - Profile Card</title>
  <link rel="stylesheet" href="../bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>
<body>
  <main class="container py-5">
    <div class="card" style="max-width: 22rem;">
      <img src="https://via.placeholder.com/600x300" class="card-img-top" alt="Profile cover image">
      <div class="card-body">
        <h1 class="card-title h5">Asha Kumar</h1>
        <p class="card-text text-muted">Bootstrap learner and aspiring front-end developer.</p>
        <a class="btn btn-primary" href="#">View profile</a>
      </div>
    </div>
  </main>
  <script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
