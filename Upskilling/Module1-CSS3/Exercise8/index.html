<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS3 Exercise 8 - Box Model</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="wrap">
    <section class="eventCard">
      <h1>Event card</h1>
      <p>This box shows margin, padding, and border working together.</p>
    </section>

    <form class="form">
      <label for="name">Name</label>
      <input id="name" type="text" placeholder="Click me">
      <p class="hidden-demo">This uses visibility: hidden.</p>
      <p class="none-demo">This uses display: none and takes no space.</p>
    </form>
  </main>
</body>
</html>
