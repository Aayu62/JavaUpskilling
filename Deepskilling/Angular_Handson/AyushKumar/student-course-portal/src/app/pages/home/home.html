<h1>{{ portalName }}</h1>

<p>
  Manage your courses, view your profile, and track your academic progress
  from one place.
</p>

<div class="stats">
  <div class="card">
    <h3>Courses Available</h3>
    <p>{{ availableCourses }}</p>
  </div>

  <div class="card">
    <h3>Enrolled</h3>
    <p>3</p>
  </div>

  <div class="card">
    <h3>GPA</h3>
    <p>3.8</p>
  </div>
</div>
<hr>

<button [disabled]="!isPortalActive"
        (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<hr>

<input
  type="text"
  placeholder="Search courses..."
  [(ngModel)]="searchTerm">

<p>Searching for: {{ searchTerm }}</p>

<!-- [property] is one-way binding -->
<!-- Example: [disabled]="!isPortalActive" -->
<!-- Means: the value comes from the component -->
<!-- If component changes, DOM updates -->
<!-- But typing/clicking in DOM does NOT change the component -->

<!-- [(ngModel)] is two-way binding -->
<!-- Example: [(ngModel)]="searchTerm" -->
<!-- Means: value flows both ways -->
<!-- If component changes, DOM updates -->
<!-- If user types in DOM, component updates too -->
