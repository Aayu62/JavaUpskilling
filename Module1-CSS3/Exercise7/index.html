<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS3 Exercise 7 - Table Styling</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="wrap">
    <table>
      <thead>
        <tr>
          <th>Event</th>
          <th>Date</th>
          <th>Venue</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>Music Night</td><td>Friday</td><td>Main Hall</td></tr>
        <tr><td>Food Fair</td><td>Saturday</td><td>Town Square</td></tr>
        <tr><td>Art Showcase</td><td>Sunday</td><td>Gallery</td></tr>
      </tbody>
    </table>
  </main>
</body>
</html>
