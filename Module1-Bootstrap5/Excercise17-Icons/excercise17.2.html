<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 17.2 - Icon Buttons</title>
  <link rel="stylesheet" href="../bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
  <main class="container py-5">
    <!-- Icon-only buttons are compact, so they work well in toolbars. -->
    <div class="d-flex gap-2">
      <button class="btn btn-primary" aria-label="Edit"><i class="bi bi-pencil"></i></button>
      <button class="btn btn-danger" aria-label="Delete"><i class="bi bi-trash"></i></button>
      <button class="btn btn-success" aria-label="Save"><i class="bi bi-check-lg"></i></button>
    </div>
  </main>
  <script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
