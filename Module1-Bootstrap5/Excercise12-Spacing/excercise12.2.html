<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 12.2 - Pricing Section</title>
  <link rel="stylesheet" href="../bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>
<body>
  <main class="container py-5">
    <!-- Spacing classes create breathing room between pricing cards and their content. -->
    <div class="row g-4">
      <div class="col-md-4">
        <div class="border rounded-3 p-4 h-100">
          <h2 class="h4">Starter</h2>
          <p class="display-6">$9</p>
          <p class="text-muted">Good for learning and small projects.</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="border rounded-3 p-4 h-100">
          <h2 class="h4">Pro</h2>
          <p class="display-6">$19</p>
          <p class="text-muted">Better for regular practice and portfolios.</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="border rounded-3 p-4 h-100">
          <h2 class="h4">Team</h2>
          <p class="display-6">$49</p>
          <p class="text-muted">Useful for group work and shared learning.</p>
        </div>
      </div>
    </div>
  </main>
  <script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
