<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 12.1 - Spacing Utilities</title>
  <link rel="stylesheet" href="../bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>
<body>
  <main class="container py-5">
    <!-- m-3 adds outside spacing, mt-4 adds top margin, p-2 adds inner spacing, and py-5 creates roomy vertical padding. -->
    <section class="bg-light border m-3 p-2">
      <h1 class="h4 mt-4">Section with spacing utilities</h1>
      <p class="mb-0">Spacing classes help you tune the layout without custom CSS.</p>
    </section>
  </main>
  <script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
