<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Structure Demo</title>
    <link href="../bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-primary text-center">Bootstrap CSS Loaded</h1>
        <button class="btn btn-success" data-bs-toggle="collapse" data-bs-target="#demo">
            Toggle Message
        </button>
        <div id="demo" class="collapse mt-3">
            <p class="lead text-muted">This collapsible section works becauseBootstrap JS is loaded.</p>
        </div>
    </div>
    <script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>    
</body>
</html>
