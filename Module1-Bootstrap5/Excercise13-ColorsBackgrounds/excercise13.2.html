<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 13.2 - Gradient Background</title>
  <link rel="stylesheet" href="../bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>
<body>
  <main class="container py-5">
    <!-- bg-gradient adds a subtle depth effect when combined with a solid contextual background class. -->
    <section class="bg-dark bg-gradient text-white p-5 rounded-3">
      <h1 class="h3">Dark gradient panel</h1>
      <p class="mb-0">White text stays readable against the darker background.</p>
    </section>
  </main>
  <script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
