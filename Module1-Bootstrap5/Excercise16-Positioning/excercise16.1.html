<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 16.1 - Fixed Footer</title>
  <link rel="stylesheet" href="../bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>
<body class="pb-5">
  <main class="container py-5">
    <p>This page has enough content so you can notice the footer staying at the bottom of the viewport.</p>
  </main>
  <!-- position-fixed and bottom-0 keep the footer attached to the bottom edge of the screen. -->
  <footer class="position-fixed bottom-0 start-0 end-0 bg-dark text-white text-center py-2">
    Fixed footer
  </footer>
  <script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
