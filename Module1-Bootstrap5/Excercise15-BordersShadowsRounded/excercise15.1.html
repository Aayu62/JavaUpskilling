<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 15.1 - Borders</title>
  <link rel="stylesheet" href="../bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>
<body>
  <main class="container py-5">
    <!-- border, border-primary, and border-3 make the image frame easy to notice. -->
    <!-- rounded-circle turns the square image into a circle. -->
    <img src="https://via.placeholder.com/200" class="border border-primary border-3 rounded-circle" alt="Circular bordered image">
  </main>
  <script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
